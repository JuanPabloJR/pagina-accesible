<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" role="img" aria-labelledby="title desc">
  <title id="title">Consulta de horarios</title>
  <desc id="desc">Un calendario semanal con bloques de horario en distintos colores.</desc>
  <rect width="640" height="320" fill="#f3f8ed"/>
  <rect x="60" y="40" width="520" height="240" rx="18" fill="#ffffff" stroke="#c5d8b2"/>
  <rect x="95" y="75" width="450" height="36" rx="10" fill="#2d6a4f"/>
  <g fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">
    <text x="120" y="98">Lun</text>
    <text x="200" y="98">Mar</text>
    <text x="280" y="98">Mie</text>
    <text x="360" y="98">Jue</text>
    <text x="440" y="98">Vie</text>
  </g>
  <rect x="105" y="126" width="65" height="122" rx="8" fill="#95d5b2"/>
  <rect x="185" y="141" width="65" height="107" rx="8" fill="#74c69d"/>
  <rect x="265" y="156" width="65" height="92" rx="8" fill="#52b788"/>
  <rect x="345" y="135" width="65" height="113" rx="8" fill="#40916c"/>
  <rect x="425" y="148" width="65" height="100" rx="8" fill="#2d6a4f"/>
</svg>
